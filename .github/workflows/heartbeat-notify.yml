name: Heartbeat Telegram Notify

on:
  workflow_dispatch:
  push:
    paths:
      - 'infinity/reports/**'
      - 'infinity/INTENTS.md'
      - 'infinity/GATES.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check time and mode (KST)
        id: time_check
        run: |
          KST_HOUR=$(TZ=Asia/Seoul date +%H)
          if [ "$KST_HOUR" -lt 8 ] || [ "$KST_HOUR" -ge 22 ]; then
            echo "mode=quiet" >> "$GITHUB_OUTPUT"
            echo "Quiet hours (KST ${KST_HOUR}시). Skipping."
          elif [ "$KST_HOUR" -eq 8 ]; then
            echo "mode=recap" >> "$GITHUB_OUTPUT"
            echo "Morning recap time."
          else
            echo "mode=normal" >> "$GITHUB_OUTPUT"
          fi

      - name: Morning recap (KST 08시)
        if: steps.time_check.outputs.mode == 'recap'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 최근 24시간 Heartbeat 커밋 요약
          SINCE=$(TZ=Asia/Seoul date -d '24 hours ago' --iso-8601=seconds 2>/dev/null || date -v-24H '+%Y-%m-%dT%H:%M:%S')
          COMMITS=$(git log --since="$SINCE" --oneline --author="Claude" -- infinity/reports/ INTENTS.md GATES.md)
          COMMIT_COUNT=$(echo "$COMMITS" | grep -c . || true)

          # 현재 INTENTS.md Active 상태
          ACTIVE=$(grep -A1 "^## Active" infinity/INTENTS.md | tail -1)

          # 현재 GATES.md 대기 중
          PENDING=$(sed -n '/^## 대기 중/,/^## /p' infinity/GATES.md | grep -c "^###" || true)

          MSG=$(printf "☀️ 아침 리캡 (최근 24시간)\n\nHeartbeat 활동: %s건\n승인 대기: %s건\n\n--- 커밋 이력 ---\n%s" "$COMMIT_COUNT" "$PENDING" "$COMMITS")

          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            > /dev/null 2>&1

          echo "Morning recap sent"

      - name: Normal notification
        if: steps.time_check.outputs.mode == 'normal'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- infinity/reports/ infinity/INTENTS.md infinity/GATES.md)

          if [ -z "$CHANGED" ]; then
            echo "No relevant changes"
            exit 0
          fi

          COMMIT_MSG=$(git log -1 --pretty=%B)

          # 조용한 종료 신호 — 커밋 메시지에 무의미 키워드가 있으면 알림 스킵
          if echo "$COMMIT_MSG" | grep -qE "활성 Intent 없음|처리할 Intent 없음|변화 없음|no activity|nothing to do"; then
            echo "Skip: no-op heartbeat commit"
            exit 0
          fi

          REPORT=$(echo "$CHANGED" | grep 'infinity/reports/' | head -1)

          if [ -n "$REPORT" ] && [ -f "$REPORT" ]; then
            # 리포트에 actions_taken 항목이 비어있으면 스킵
            if grep -qE "actions_taken:\s*\[\]|actions_taken:\s*$|수행 액션:\s*0건|actions_taken:\s*없음" "$REPORT"; then
              echo "Skip: report has no actions"
              exit 0
            fi
            CONTENT=$(head -30 "$REPORT")
            MSG=$(printf '🤖 Heartbeat Report\n\n%s' "$CONTENT")
          else
            MSG=$(printf '🤖 Heartbeat Update\n\n%s' "$COMMIT_MSG")
          fi

          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            > /dev/null 2>&1

          echo "Notification sent"
